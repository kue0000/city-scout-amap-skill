      <text class="font metric jade" x="34" y="72">245m</text>
      <text class="font small muted" x="34" y="124">首段路线距离</text>
    </g>
    <g transform="translate(740 0)">
      <rect x="0" y="0" width="324" height="164" rx="20" fill="#ffffff" stroke="#dce4e1"/>
      <text class="font metric" x="34" y="72" fill="#a56a00">15</text>
      <text class="font small muted" x="34" y="124">路线折点</text>
    </g>
