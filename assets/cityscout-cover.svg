    <text class="font subtitle muted" x="0" y="306">唤醒城市沉睡的基因</text>
  </g>

  <g transform="translate(88 670)" filter="url(#shadow)">
    <rect x="0" y="0" width="1064" height="520" rx="28" fill="#ffffff"/>
    <rect x="36" y="36" width="992" height="300" rx="20" fill="#edf4f1"/>
    <path d="M106 266C206 176 309 184 404 232C498 280 588 282 674 218C765 150 867 152 978 96" fill="none" stroke="#1769e0" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#12805c">
      <circle cx="106" cy="266" r="16"/><circle cx="404" cy="232" r="16"/><circle cx="674" cy="218" r="16"/><circle cx="978" cy="96" r="16"/>
    </g>
    <g fill="#ffffff" stroke="#1769e0" stroke-width="8">
      <circle cx="240" cy="184" r="18"/><circle cx="548" cy="282" r="18"/><circle cx="812" cy="146" r="18"/>
    </g>
    <text class="font label ink" x="50" y="390">真实高德地图 + POI 点位 + 步行路线</text>
    <text class="font body muted" x="50" y="448">把地图线索转成可现场验证的证据路线</text>
  </g>

  <g transform="translate(88 1262)">
