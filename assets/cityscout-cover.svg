<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1660" viewBox="0 0 1240 1660">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6faf8"/>
      <stop offset="0.55" stop-color="#e7f0ec"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12805c"/>
      <stop offset="1" stop-color="#1769e0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#142126" flood-opacity="0.16"/>
    </filter>
    <style>
      .font { font-family: Inter, 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif; }
      .ink { fill: #142126; }
      .muted { fill: #5c6872; }
      .jade { fill: #12805c; }
      .blue { fill: #1769e0; }
      .small { font-size: 30px; }
      .body { font-size: 34px; }
      .label { font-size: 28px; font-weight: 700; }
      .title { font-size: 92px; font-weight: 900; letter-spacing: 0; }
      .subtitle { font-size: 40px; font-weight: 700; }
      .metric { font-size: 54px; font-weight: 900; }
    </style>
  </defs>

  <rect width="1240" height="1660" fill="url(#bg)"/>
  <path d="M84 145C238 68 386 82 520 188C612 260 714 276 826 230C956 176 1057 205 1168 322" fill="none" stroke="#12805c" stroke-opacity="0.18" stroke-width="34" stroke-linecap="round"/>
  <path d="M100 1288C245 1168 410 1182 566 1280C718 1376 835 1394 1006 1295" fill="none" stroke="#1769e0" stroke-opacity="0.16" stroke-width="36" stroke-linecap="round"/>

  <g transform="translate(88 88)">
    <rect x="0" y="0" width="98" height="98" rx="18" fill="url(#brand)" filter="url(#shadow)"/>
    <text class="font" x="49" y="62" text-anchor="middle" font-size="38" font-weight="900" fill="#fff">CS</text>
    <text class="font label jade" x="126" y="38">城市踏勘官 CityScout</text>
    <text class="font small muted" x="126" y="82">高德开放平台 Skill 创意征集赛</text>
  </g>

  <g transform="translate(88 250)">
